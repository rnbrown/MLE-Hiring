services:
  mock-api:
    build: ./mock-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
    env_file: .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1

  pipeline:
    build: ./src
    volumes:
      - ./data:/app/data
    env_file: .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    depends_on:
      - mock-api

  test:
    build: ./src
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    env_file: .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONPATH=/app:/app/src
    command: ["python", "-m", "pytest", "tests/", "-v"]
